<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Salary Center</title>
    <style>
        :root { --bg-color: #f2f2f7; --card-bg: #ffffff; --text-main: #1c1c1e; --text-sub: #8e8e93; --color-1: #007AFF; --color-2: #FF3B30; --color-3: #34C759; --color-4: #FF9500; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg-color); margin: 0; padding: 15px 10px 100px; user-select: none; }
        .hint-btn { position: fixed; top: 15px; left: 15px; width: 35px; height: 35px; background: rgba(0,0,0,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-sub); z-index: 1000; }
        #allTotalOverlay { display: none; position: fixed; top: 15px; right: 15px; background: rgba(0,0,0,0.85); color: #fff; padding: 12px 22px; border-radius: 40px; z-index: 3000; font-weight: 700; }
        .year-section { background: var(--card-bg); border-radius: 14px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .year-header { padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .month-content { max-height: 0; opacity: 0; display: grid; padding: 0 10px; grid-template-columns: repeat(2, 1fr); gap: 10px; transition: all 0.4s ease; }
        .year-section.active .month-content { max-height: 1000px; opacity: 1; padding: 0 10px 15px; }
        .month-card { background: var(--bg-color); padding: 12px; border-radius: 12px; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .has-data { border-left: 4px solid var(--color-1); background-color: #f0f7ff; }
        .footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); padding: 15px 20px 35px; z-index: 900; border-top: 1px solid #d1d1d6; }
        .input-container { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        input[type="text"] { flex: 1; padding: 14px; font-size: 18px; border: 1px solid #d1d1d6; border-radius: 12px; outline: none; }
        button.save-btn { padding: 0 25px; background-color: var(--color-1); color: white; border: none; border-radius: 12px; font-weight: 700; }
        #customModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #fff; width: 85%; max-width: 320px; padding: 30px 20px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="hint-btn" onclick="alert('a: 合計\ncopy: バックアップ')">?</div>
    <div id="allTotalOverlay" onclick="this.style.display='none'"></div>
    <div id="calendar-container"></div>
    <div class="footer-fixed">
        <div class="input-container">
            <input type="text" id="salaryInput" placeholder="25/3/250000" inputmode="text">
            <button class="save-btn" onclick="handleInput()">保存</button>
        </div>
    </div>
    <div id="customModal">
        <div class="modal-content">
            <span id="modalDate" style="font-weight: 800; font-size: 1.2rem;"></span>
            <div style="margin-top:25px; display:flex; flex-direction:column; gap:10px;">
                <button class="save-btn" style="padding:15px;" id="confirmYes">編集</button>
                <button style="padding:15px; border:1px solid var(--color-2); color:var(--color-2); background:none; border-radius:12px;" id="confirmReset">削除</button>
                <button style="padding:10px; background:none; border:none; color:var(--text-sub);" onclick="document.getElementById('customModal').style.display='none'">キャンセル</button>
            </div>
        </div>
    </div>
    <script>
        const monthNames = ["1月", "2月", "3月", "4月", "5月", "6月", "7月", "8月", "9月", "10月", "11月", "12月"];
        const startYear = 25, endYear = 34;
        let salaryData = JSON.parse(localStorage.getItem('mySalaryData') || '{}');

        function initCalendar(openYear = null) {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            for (let y = startYear; y <= endYear; y++) {
                let total = 0; for (let m = 1; m <= 12; m++) total += (salaryData[`${y}/${m}`]?.amount || 0);
                const section = document.createElement('div');
                section.className = 'year-section' + (y === openYear ? ' active' : '');
                section.innerHTML = `<div class="year-header" onclick="this.parentElement.classList.toggle('active')"><div style="font-weight:700">20${y}年</div><div>¥${total.toLocaleString()}</div></div><div class="month-content"></div>`;
                const grid = section.querySelector('.month-content');
                for (let m = 1; m <= 12; m++) {
                    const d = salaryData[`${y}/${m}`] || { amount: 0 };
                    const card = document.createElement('div');
                    card.className = `month-card ${d.amount > 0 ? 'has-data' : ''}`;
                    let lastTap = 0;
                    card.ontouchend = () => {
                        let now = Date.now();
                        if (now - lastTap < 300 && d.amount > 0) openEditModal(y, m, d);
                        lastTap = now;
                    };
                    card.innerHTML = `<div style="font-size:0.7rem; color:var(--text-sub)">${monthNames[m-1]}</div><div style="font-weight:800">¥${d.amount.toLocaleString()}</div>`;
                    grid.appendChild(card);
                }
                container.appendChild(section);
            }
        }

        function handleInput() {
            const el = document.getElementById('salaryInput');
            const val = el.value.trim().toLowerCase();
            if (val === 'a') {
                let t = 0; Object.values(salaryData).forEach(d => t += d.amount);
                alert("総支給額合計: ¥" + t.toLocaleString());
            } else if (val === 'copy') {
                navigator.clipboard.writeText(JSON.stringify(salaryData));
                alert("バックアップをコピーしました。");
            } else {
                const m = val.match(/^(\d+)\/(\d+)\/(\d+)/);
                if (m) {
                    salaryData[`${m[1]}/${m[2]}`] = { amount: parseInt(m[3]) };
                    localStorage.setItem('mySalaryData', JSON.stringify(salaryData));
                    initCalendar(parseInt(m[1]));
                }
            }
            el.value = ''; el.blur();
        }

        function openEditModal(y, m, d) {
            document.getElementById('modalDate').innerText = `20${y}年 ${monthNames[m-1]}`;
            const mo = document.getElementById('customModal'); mo.style.display = 'flex';
            document.getElementById('confirmYes').onclick = () => {
                document.getElementById('salaryInput').value = `${y}/${m}/${d.amount}`;
                mo.style.display = 'none';
            };
            document.getElementById('confirmReset').onclick = () => {
                if(confirm('削除しますか？')){
                    delete salaryData[`${y}/${m}`];
                    localStorage.setItem('mySalaryData', JSON.stringify(salaryData));
                    initCalendar(y); mo.style.display = 'none';
                }
            };
        }
        initCalendar(new Date().getFullYear() % 100);
    </script>
</body>
</html>
