<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Salary Center Pro</title>
    <style>
        :root {
            --bg-color: #f2f2f7; --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-sub: #8e8e93;
            --accent-work: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --color-1: #007AFF; --color-2: #FF3B30; --color-3: #34C759; --color-4: #FF9500;
            /* グラデーション定義 */
            --grad-blue: linear-gradient(135deg, #007AFF 0%, #0051D5 100%);
            --grad-red: linear-gradient(135deg, #FF3B30 0%, #D7261B 100%);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        /* スライド構造 */
        .main-slider { display: flex; width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .main-slider::-webkit-scrollbar { display: none; }
        .page { width: 100%; height: 100%; flex: 0 0 100%; scroll-snap-align: start; overflow-y: auto; padding: 85px 15px 120px; position: relative; }

        /* ナビゲーション */
        .nav-dots { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10000; padding: 10px 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 20px; }
        .dot { width: 10px; height: 10px; background: #ccc; border-radius: 50%; transition: 0.3s; }
        .dot.active { background: #6366f1; width: 25px; border-radius: 10px; }

        /* --- Page 1: Dashboard --- */
        #page1 { background: #f8fafc; }
        .work-card { background: var(--accent-work); border-radius: 24px; padding: 25px; color: white; box-shadow: 0 8px 25px rgba(99, 102, 241, 0.25); margin-bottom: 20px; min-height: 190px; position: relative; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        #display-shop { align-self: flex-start; font-size: 1.4rem; font-weight: 800; opacity: 0.95; letter-spacing: 0.2px; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .current-total { font-size: 2.7rem; font-weight: 950; margin: 0; line-height: 1; }
        .edit-cfg-btn { align-self: flex-end; background: rgba(255,255,255,0.25); border: none; color: white; padding: 10px 18px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }

        /* カレンダー（今日ネイビー、選択枠のみ） */
        .cal-container { background: white; border-radius: 22px; padding: 20px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day-label { font-size: 0.65rem; color: var(--text-sub); font-weight: 800; text-align: center; margin-bottom: 8px; }
        .cal-cell { height: 48px; border-radius: 10px; background: #f8fafc; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.15s; cursor: pointer; }
        .cal-cell.has-data { background: #f0f7ff; }
        .cal-cell.today { background: #1e293b !important; }
        .cal-cell.today .cal-date-num { color: white !important; font-weight: 900; }
        .cal-cell.today .cal-amt-hint { color: #7dd3fc !important; }
        .cal-cell.selected { background: inherit !important; outline: 3px solid var(--color-1) !important; outline-offset: -3px; z-index: 10; }

        .cal-date-num { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
        .cal-amt-hint { font-size: 0.5rem; color: var(--color-1); font-weight: 800; margin-top: 2px; }

        /* 記録ボード */
        .record-board { background: white; border-radius: 22px; padding: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 25px; }
        input[type="time"] { border: 1px solid #f1f5f9; background: #f8fafc; padding: 12px 5px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; color: #4f46e5; text-align: center; -webkit-appearance: none; width: 45%; }
        .add-btn { width: 100%; background: #1e293b; color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 1rem; cursor: pointer; }

        /* レポート */
        .report-header { font-weight: 800; font-size: 0.75rem; color: var(--text-sub) !important; margin-bottom: 12px; padding-left: 5px; letter-spacing: 2px; }
        .history-item { background: white; padding: 14px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.03); border-left: 4px solid #eef2f6; }

        /* --- ダイアログボタンのグラデーション強制設定 --- */
        .btn-rewrite { background: var(--grad-blue) !important; color: white !important; border: none !important; }
        .btn-delete { background: var(--grad-red) !important; color: white !important; border: none !important; }

        /* Page 2 & Setup (既存の完璧な状態を維持) */
        #page2 { background: var(--bg-color); }
        #setup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 999999; flex-direction: column; align-items: center; justify-content: center; transition: background 0.4s ease; }
        #setup-overlay.active { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
        .setup-panel { background: white; width: 90%; max-width: 360px; padding: 40px 30px; border-radius: 32px; transform: translateY(100px); opacity: 0; transition: 0.45s ease; }
        #setup-overlay.active .setup-panel { transform: translateY(0); opacity: 1; }
        .setup-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #f1f5f9; outline: none; font-size: 1.1rem; }

        #customModal, #alertModal, #secretEditModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 85%; max-width: 320px; padding: 30px 20px; border-radius: 24px; text-align: center; }
    </style>
</head>
<body>

    <div class="nav-dots">
        <div class="dot active" id="dot1" onclick="goToPage(0)"></div>
        <div class="dot" id="dot2" onclick="goToPage(1)"></div>
    </div>

    <div class="main-slider" id="mainSlider">
        <div class="page" id="page1">
            <div class="work-card">
                <div id="display-shop">---</div>
                <div id="display-total" class="current-total">¥0</div>
                <button class="edit-cfg-btn" onclick="showSetup(true)">EDIT SETTINGS</button>
            </div>
            <div class="cal-container">
                <div class="month-nav" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <button class="nav-arrow" onclick="changeMonth(-1)">←</button>
                    <div id="display-month" class="month-display">---</div>
                    <button class="nav-arrow" onclick="changeMonth(1)">→</button>
                </div>
                <div id="cal-body" class="cal-grid"></div>
            </div>
            <div class="record-board">
                <div id="selected-date-text" style="font-weight:900; margin-bottom:15px;">SELECT DATE</div>
                <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                    <input type="time" id="work-start" value="09:00">
                    <input type="time" id="work-end" value="18:00">
                </div>
                <button class="add-btn" id="save-btn" onclick="handleLogShift()">Record Shift</button>
            </div>
            <div class="report-header">MONTHLY REPORT</div>
            <div id="log-container"></div>
        </div>

        <div class="page" id="page2">
            <div style="padding: 20px 0; text-align: center; font-weight: 800; color: var(--text-sub); letter-spacing: 2px;">SECRET SALARY CENTER</div>
            <div id="salary-calendar-container"></div>
            <div style="position:fixed; bottom:0; left:0; right:0; background:rgba(255,255,255,0.95); padding:15px 20px 40px; border-top:1px solid #ddd; display:flex; gap:10px;" id="footer-secret">
                <input type="text" id="salaryInput" placeholder="yy/mm/amt/memo..." style="flex:1; padding:14px; border-radius:12px; border:1px solid #ddd;">
                <button class="add-btn" style="width:auto; padding:0 20px;" onclick="handleSecretInput()">Save</button>
            </div>
        </div>
    </div>

    <div id="setup-overlay">
        <div class="setup-panel">
            <h2 style="font-weight:950; margin-bottom:25px; text-align:center;">Settings</h2>
            <label style="font-size:0.7rem; font-weight:800; color:#888;">STORE NAME</label>
            <input type="text" id="setup-shop" class="setup-input"> 
            <label style="font-size:0.7rem; font-weight:800; color:#888;">HOURLY WAGE (¥)</label>
            <input type="text" id="setup-wage" class="setup-input" inputmode="numeric">
            <label style="font-size:0.7rem; font-weight:800; color:#888;">NIGHT RATE (%)</label>
            <input type="text" id="setup-night-rate" class="setup-input" inputmode="numeric">
            <button class="add-btn" onclick="saveSetup()">Save & Start</button>
            <button id="setup-cancel-btn" style="background:none; color:#888; width:100%; margin-top:10px; border:none; display:none;" onclick="hideSetup()">Cancel</button>
        </div>
    </div>

    <div id="customModal">
        <div class="modal-content">
            <h3 id="modalTitle"></h3>
            <p id="modalMsg" style="color:#888; margin-bottom:20px;"></p>
            <button id="modalConfirmBtn" class="add-btn">Action</button>
            <button class="add-btn" style="background:none; color:#888; margin-top:5px;" onclick="closeModal()">Cancel</button>
        </div>
    </div>
    <div id="alertModal" onclick="this.style.display='none'"><div class="modal-content"><p id="alertMsg" style="font-weight:800; color:var(--color-2)"></p></div></div>
    <div id="secretEditModal"><div class="modal-content"><span id="secretModalDate" style="font-weight:800;"></span><div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;"><button class="add-btn btn-rewrite" id="secretConfirmEdit">Edit</button><button class="add-btn" style="background:none; color:var(--color-2); border:1px solid var(--color-2);" id="secretConfirmReset">Reset</button><button class="add-btn" style="background:none; color:#888;" onclick="document.getElementById('secretEditModal').style.display='none'">Cancel</button></div></div></div>

    <script>
        let config = JSON.parse(localStorage.getItem('workConfigV34')) || null;
        let logs = JSON.parse(localStorage.getItem('workLogsV34')) || [];
        let salaryData = JSON.parse(localStorage.getItem('myTenYearSalaryData')) || {};
        let viewDate = new Date(); let selectedDateStr = "";
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        const slider = document.getElementById('mainSlider');
        slider.addEventListener('scroll', () => {
            const pageIndex = Math.round(slider.scrollLeft / slider.offsetWidth);
            document.getElementById('dot1').classList.toggle('active', pageIndex === 0);
            document.getElementById('dot2').classList.toggle('active', pageIndex === 1);
            document.getElementById('footer-secret').style.display = (pageIndex === 1) ? 'flex' : 'none';
        });
        function goToPage(idx) { slider.scrollTo({ left: slider.offsetWidth * idx, behavior: 'smooth' }); }

        function showSetup(edit) { 
            const overlay = document.getElementById('setup-overlay'); overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);
            if(edit && config) { document.getElementById('setup-shop').value = config.name; document.getElementById('setup-wage').value = config.wage; document.getElementById('setup-night-rate').value = config.nightRate; document.getElementById('setup-cancel-btn').style.display = 'block'; }
        }
        function hideSetup() { document.getElementById('setup-overlay').classList.remove('active'); setTimeout(() => document.getElementById('setup-overlay').style.display = 'none', 450); }
        function saveSetup() {
            const n = document.getElementById('setup-shop').value.trim(), w = document.getElementById('setup-wage').value.trim(), r = document.getElementById('setup-night-rate').value.trim();
            if(!n || !/^\d+$/.test(w) || !/^\d+$/.test(r)) { showAlert("Error: Check inputs (Numbers only)"); return; }
            config = { name:n, wage:parseInt(w), nightRate:parseInt(r) };
            localStorage.setItem('workConfigV34', JSON.stringify(config)); hideSetup(); updateDash();
        }

        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); updateDash(); }
        
        function renderCalendar() {
            const body = document.getElementById('cal-body'); body.innerHTML = '';
            ["S","M","T","W","T","F","S"].forEach(d => { const l = document.createElement('div'); l.className="cal-day-label"; l.innerText=d; body.appendChild(l); });
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
            const todayStr = `${new Date().getFullYear()}-${(new Date().getMonth()+1).toString().padStart(2,'0')}-${new Date().getDate().toString().padStart(2,'0')}`;
            for(let i=0; i<first; i++) body.appendChild(document.createElement('div'));
            for(let d=1; d<=last; d++) {
                const f = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const log = logs.find(l => l.fullDate === f); const cell = document.createElement('div');
                cell.className = `cal-cell ${log ? 'has-data' : ''} ${selectedDateStr === f ? 'selected' : ''}`;
                if(f === todayStr) cell.classList.add('today');
                cell.innerHTML = `<div class="cal-date-num">${d}</div>${log ? `<div class="cal-amt-hint">¥${(log.amt/1000).toFixed(1)}k</div>` : ''}`;
                cell.onclick = () => selectDate(f);
                body.appendChild(cell);
            }
        }

        // --- ① Rewrite Shift の切り替え ---
        function selectDate(dateStr) {
            selectedDateStr = dateStr;
            const log = logs.find(l => l.fullDate === dateStr);
            const btn = document.getElementById('save-btn');
            if(log) {
                document.getElementById('work-start').value = log.start;
                document.getElementById('work-end').value = log.end;
                btn.innerText = "Rewrite Shift"; // 既存データがある日は文字変更
            } else {
                document.getElementById('work-start').value = "09:00";
                document.getElementById('work-end').value = "18:00";
                btn.innerText = "Record Shift";
            }
            renderCalendar();
        }

        function handleLogShift() { 
            if(!selectedDateStr) return; 
            if(logs.find(l => l.fullDate === selectedDateStr)) {
                // ② 文言：Rewrite / デザイン：青グラデ
                showModal("Update Record?", "Overwrite existing shift?", "Rewrite", "btn-rewrite", () => executeSave()); 
            } else executeSave(); 
        }

        function executeSave() {
            const s = document.getElementById('work-start').value, e = document.getElementById('work-end').value;
            const res = calculatePay(s, e);
            logs = logs.filter(l => l.fullDate !== selectedDateStr);
            logs.unshift({ id: Date.now(), fullDate: selectedDateStr, start: s, end: e, amt: res.total, rate: config.nightRate, wage: config.wage, monthKey: `${new Date(selectedDateStr.replace(/-/g,'/')).getFullYear()%100}/${new Date(selectedDateStr.replace(/-/g,'/')).getMonth()+1}`, date: `${new Date(selectedDateStr.replace(/-/g,'/')).getMonth()+1}/${new Date(selectedDateStr.replace(/-/g,'/')).getDate()}`, dur: res.duration, surcharge: res.surcharge });
            localStorage.setItem('workLogsV34', JSON.stringify(logs)); updateDash(); selectDate(selectedDateStr);
        }

        function updateDash() {
            if(!config) { showSetup(false); return; }
            document.getElementById('display-month').innerText = viewDate.toLocaleString('en', {month:'long'}).toUpperCase() + ` (${viewDate.getMonth()+1})`;
            document.getElementById('display-shop').innerText = config.name.toUpperCase();
            const monthKey = `${viewDate.getFullYear()%100}/${viewDate.getMonth()+1}`;
            const mLogs = logs.filter(l => l.monthKey === monthKey).sort((a,b) => a.fullDate.localeCompare(b.fullDate));
            document.getElementById('display-total').innerText = `¥${mLogs.reduce((sum,l)=>sum+l.amt, 0).toLocaleString()}`;
            renderCalendar();
            document.getElementById('log-container').innerHTML = mLogs.map(l => `
                <div class="history-item">
                    <div style="flex:1;">
                        <div style="font-weight:700;">${l.date} <span style="font-size:10px; color:#888;">(${l.start}-${l.end})</span></div>
                        <div style="font-size:10px; color:#888;">${l.dur}h / ¥${(l.wage||0).toLocaleString()} / N.R-${l.rate||0}%</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:900; color:#4f46e5;">+¥${l.amt.toLocaleString()}</div>
                    </div>
                    <div onclick="confirmDelete(${l.id})" style="color:var(--color-2); font-size:22px; font-weight:900; padding: 0 10px; cursor:pointer; min-width:44px; text-align:right;">✕</div>
                </div>
            `).join('');
        }

        function calculatePay(s, e) {
            const toM = (t) => { const [h,m] = t.split(':').map(Number); return h*60+m; };
            let sM = toM(s), eM = toM(e); if(eM <= sM) eM += 1440;
            let night = 0; for(let i=sM; i<eM; i++) { const c = i%1440; if(c >= 1320 || c < 300) night++; }
            const totalH = (eM-sM)/60, nightH = night/60;
            const basic = totalH * config.wage, sur = nightH * (config.wage * (config.nightRate/100));
            return { total: Math.floor(basic + sur), duration: totalH.toFixed(1), surcharge: Math.floor(sur) };
        }

        function initSalaryCalendar(openYear = null) {
            const container = document.getElementById('salary-calendar-container'); container.innerHTML = '';
            for (let y = 25; y <= 34; y++) {
                let yearly = 0; for (let m = 1; m <= 12; m++) yearly += (salaryData[`${y}/${m}`]?.amount || 0);
                const section = document.createElement('div'); section.className = 'year-section' + (y === openYear ? ' active' : '');
                section.innerHTML = `<div class="year-header" onclick="this.parentElement.classList.toggle('active')"><div>20${y}</div><div>¥${yearly.toLocaleString()}</div></div><div class="month-content"></div>`;
                const grid = section.querySelector('.month-content');
                for (let m = 1; m <= 12; m++) {
                    const d = salaryData[`${y}/${m}`] || { amount: 0, memo: '' };
                    const card = document.createElement('div'); card.className = `month-card ${d.amount > 0 ? 'has-data' : ''}`;
                    card.onclick = () => { if(d.amount > 0) openSecretEdit(y, m, d); };
                    card.innerHTML = `<div>${monthNames[m-1]}</div><b>¥${d.amount.toLocaleString()}</b>${d.memo ? `<div style="font-size:0.5rem; color:var(--color-3);">📄 ${d.memo}</div>` : ''}`;
                    grid.appendChild(card);
                }
                container.appendChild(section);
            }
        }

        function handleSecretInput() {
            const el = document.getElementById('salaryInput'); const m = el.value.trim().match(/^(\d+)\/(\d+)\/(\d+)(?:\/(.*))?$/);
            if (m) { const y = parseInt(m[1]), mo = parseInt(m[2]), amt = parseInt(m[3]), memo = m[4] || ''; salaryData[`${y}/${mo}`] = { amount: amt, memo: memo }; localStorage.setItem('myTenYearSalaryData', JSON.stringify(salaryData)); initSalaryCalendar(y); }
            el.value = ''; el.blur();
        }

        function openSecretEdit(y, m, d) {
            document.getElementById('secretModalDate').innerText = `20${y}/${monthNames[m-1]}`;
            document.getElementById('secretEditModal').style.display = 'flex';
            document.getElementById('secretConfirmEdit').onclick = () => { document.getElementById('salaryInput').value = `${y}/${m}/${d.amount}${d.memo ? '/' + d.memo : ''}`; document.getElementById('secretEditModal').style.display = 'none'; document.getElementById('salaryInput').focus(); };
            document.getElementById('secretConfirmReset').onclick = () => { delete salaryData[`${y}/${m}`]; localStorage.setItem('myTenYearSalaryData', JSON.stringify(salaryData)); initSalaryCalendar(y); document.getElementById('secretEditModal').style.display = 'none'; };
        }

        function showAlert(msg) { document.getElementById('alertMsg').innerText = msg; document.getElementById('alertModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; }
        
        // 修正：動的にボタンの文字と色を変える showModal
        function showModal(title, msg, btnText, btnClass, onConfirm) { 
            document.getElementById('modalTitle').innerText = title; 
            document.getElementById('modalMsg').innerText = msg; 
            const btn = document.getElementById('modalConfirmBtn'); 
            btn.innerText = btnText;
            btn.className = "add-btn " + btnClass; // ここでグラデーションを適用
            btn.onclick = () => { onConfirm(); closeModal(); }; 
            document.getElementById('customModal').style.display = 'flex'; 
        }
        
        function confirmDelete(id) { 
            // ③ 文言：Delete / デザイン：赤グラデ
            showModal("Delete Record?", "Remove this shift?", "Delete", "btn-delete", () => { 
                logs = logs.filter(l => l.id !== id); 
                localStorage.setItem('workLogsV34', JSON.stringify(logs)); 
                updateDash(); 
            }); 
        }

        const initD = new Date();
        selectedDateStr = `${initD.getFullYear()}-${(initD.getMonth()+1).toString().padStart(2,'0')}-${initD.getDate().toString().padStart(2,'0')}`;
        updateDash(); selectDate(selectedDateStr); initSalaryCalendar(initD.getFullYear() % 100);
    </script>
</body>
</html>
