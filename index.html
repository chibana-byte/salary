<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Salary Center Pro</title>
    <style>
        :root {
            --bg-color: #f2f2f7; --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-sub: #8e8e93;
            --accent-work: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --color-1: #007AFF; --color-2: #FF3B30; --color-3: #34C759; --color-4: #FF9500;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: var(--bg-color); font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

        /* スライド構造 */
        .main-slider { display: flex; width: 100%; height: 100%; overflow-x: auto; overflow-y: hidden; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .main-slider::-webkit-scrollbar { display: none; }
        .page { width: 100%; height: 100%; flex: 0 0 100%; scroll-snap-align: start; overflow-y: auto; padding: 85px 15px 120px; position: relative; }

        /* ナビゲーション */
        .nav-dots { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px; z-index: 10000; padding: 10px 20px; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border-radius: 20px; }
        .dot { width: 10px; height: 10px; background: #ccc; border-radius: 50%; transition: 0.3s; cursor: pointer; }
        .dot.active { background: #6366f1; width: 25px; border-radius: 10px; }

        /* --- Page 1: Dashboard --- */
        #page1 { background: #f8fafc; }
        .work-card { background: var(--accent-work); border-radius: 24px; padding: 25px; color: white; box-shadow: 0 8px 25px rgba(99, 102, 241, 0.25); margin-bottom: 20px; min-height: 190px; position: relative; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        #display-shop { align-self: flex-start; font-size: 1.4rem; font-weight: 800; opacity: 0.95; letter-spacing: 0.2px; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .current-total { font-size: 2.7rem; font-weight: 950; margin: 0; line-height: 1; }
        .edit-cfg-btn { align-self: flex-end; background: rgba(255,255,255,0.25); border: none; color: white; padding: 10px 18px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; cursor: pointer; }

        .cal-container { background: white; border-radius: 22px; padding: 20px 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 15px; }
        .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; padding: 0 10px; }
        .nav-arrow { background: #f1f5f9; border: none; color: var(--color-1); width: 32px; height: 32px; border-radius: 50%; font-size: 1rem; font-weight: 900; display: flex; align-items: center; justify-content: center; }
        .month-display { font-size: 0.95rem; font-weight: 800; color: #1e293b; text-transform: uppercase; letter-spacing: 1px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .cal-day-label { font-size: 0.65rem; color: var(--text-sub); font-weight: 800; text-align: center; margin-bottom: 8px; }
        
        /* カレンダーセル */
        .cal-cell { height: 48px; border-radius: 10px; background: #f8fafc; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px solid transparent; transition: 0.15s; cursor: pointer; z-index: 1; }
        .cal-cell.has-data { background: #f0f7ff; }

        /* --- 修正：今日の日付（濃いネイビー） --- */
        .cal-cell.today { background: #1e293b !important; }
        .cal-cell.today .cal-date-num { color: white !important; font-weight: 900; }
        .cal-cell.today .cal-amt-hint { color: #7dd3fc !important; }

        /* --- 修正：選択時のデザイン（背景塗りつぶしを廃止） --- */
        .cal-cell.selected { 
            /* 背景の白塗りつぶしを削除 */
            outline: 3px solid var(--color-1); 
            outline-offset: -3px; 
            z-index: 10; 
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3); 
        }

        .cal-date-num { font-size: 0.85rem; font-weight: 700; color: var(--text-main); }
        .cal-amt-hint { font-size: 0.5rem; color: var(--color-1); font-weight: 800; margin-top: 2px; }

        .record-board { background: white; border-radius: 22px; padding: 22px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 25px; border: 1px solid #eef2f6; }
        .selected-date-title { font-size: 1.25rem; font-weight: 900; color: #1e293b; margin-bottom: 20px; display: block; border-left: 5px solid var(--color-1); padding-left: 12px; }
        .time-input-group { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
        input[type="time"] { flex:1; min-width: 0; border: 1px solid #f1f5f9; background: #f8fafc; padding: 12px 5px; border-radius: 12px; font-size: 1.1rem; font-weight: 700; color: #4f46e5; text-align: center; -webkit-appearance: none; }
        .add-btn { width: 100%; background: #1e293b; color: white; border: none; padding: 18px; border-radius: 16px; font-weight: 700; font-size: 1rem; cursor: pointer; }

        /* レポートヘッダー：グレーを維持 */
        .report-header { font-weight: 800; font-size: 0.75rem; color: var(--text-sub) !important; margin-bottom: 12px; padding-left: 5px; letter-spacing: 2px; text-transform: uppercase; }
        .history-item { background: white; padding: 14px; border-radius: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 6px rgba(0,0,0,0.03); border-left: 4px solid #eef2f6; }
        .history-item.has-night { border-left-color: var(--color-1); }

        /* Page 2: Secret Records */
        #page2 { background: var(--bg-color); }
        .year-section { background: var(--card-bg); border-radius: 14px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .year-header { padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 800; }
        .month-content { max-height: 0; opacity: 0; display: grid; padding: 0 10px; grid-template-columns: repeat(2, 1fr); gap: 10px; background: var(--card-bg); transition: max-height 0.4s ease, opacity 0.3s ease; }
        .year-section.active .month-content { max-height: 1000px; opacity: 1; padding: 0 10px 15px; }
        .month-card { background: var(--bg-color); padding: 12px; border-radius: 12px; min-height: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .month-card.has-data { border-left: 4px solid var(--color-1); background-color: #f0f7ff; }
        #footer-secret { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); padding: 15px 20px 40px; z-index: 900; border-top: 1px solid #d1d1d6; transform: translateY(100%); transition: transform 0.3s; }

        /* Setup & Modals */
        #setup-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0); z-index: 999999; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; transition: background 0.4s ease, backdrop-filter 0.4s ease; }
        #setup-overlay.active { background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); }
        .setup-panel { background: white; width: 90%; max-width: 360px; padding: 40px 30px; border-radius: 32px; transform: translateY(100px); opacity: 0; transition: transform 0.45s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 0.3s ease; }
        #setup-overlay.active .setup-panel { transform: translateY(0); opacity: 1; }
        #customModal, #alertModal, #secretEditModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 85%; max-width: 320px; padding: 30px 20px; border-radius: 24px; text-align: center; }
        .setup-input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 2px solid #f1f5f9; outline: none; font-size: 1.1rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="nav-dots">
        <div class="dot active" id="dot1" onclick="goToPage(0)"></div>
        <div class="dot" id="dot2" onclick="goToPage(1)"></div>
    </div>

    <div class="main-slider" id="mainSlider">
        <div class="page" id="page1">
            <div class="work-card">
                <div id="display-shop">---</div>
                <div id="display-total" class="current-total">¥0</div>
                <button class="edit-cfg-btn" onclick="showSetup(true)">EDIT SETTINGS</button>
            </div>
            <div class="cal-container">
                <div class="month-nav">
                    <button class="nav-arrow" onclick="changeMonth(-1)">←</button>
                    <div id="display-month" class="month-display">---</div>
                    <button class="nav-arrow" onclick="changeMonth(1)">→</button>
                </div>
                <div class="cal-grid" id="cal-body"></div>
            </div>
            <div class="record-board">
                <div id="selected-date-text" class="selected-date-title">SELECT DATE</div>
                <div class="time-input-group">
                    <input type="time" id="work-start" value="09:00">
                    <div style="align-self:center; font-weight:800; color:#ccc;">to</div>
                    <input type="time" id="work-end" value="18:00">
                </div>
                <button class="add-btn" id="save-btn" onclick="handleLogShift()">Record Shift</button>
            </div>
            <div class="report-header">MONTHLY REPORT</div>
            <div id="log-container"></div>
        </div>

        <div class="page" id="page2">
            <div style="position: absolute; top: 15px; left: 15px; width: 35px; height: 35px; background: rgba(0,0,0,0.03); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-sub); font-size: 14px; z-index: 1000;" onclick="showAlert('a: Total / gYY: Graph / y/m/a/memo')">?</div>
            <div style="padding: 20px 0; text-align: center; font-weight: 800; color: var(--text-sub); letter-spacing: 2px;">SECRET SALARY CENTER</div>
            <div id="salary-calendar-container"></div>
            <div id="footer-secret">
                <div style="display:flex; gap:10px;">
                    <input type="text" id="salaryInput" placeholder="yy/mm/amt/memo..." style="flex:1; padding:14px; border-radius:12px; border:1px solid #ddd; outline:none;">
                    <button class="add-btn" style="width:auto; padding:0 20px;" onclick="handleSecretInput()">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div id="setup-overlay">
        <div class="setup-panel">
            <h2 style="font-weight: 950; margin-bottom: 30px; text-align: center;">Settings</h2>
            <label style="font-size: 0.7rem; font-weight: 800; color: #888; display:block; margin-bottom:5px;">STORE NAME</label>
            <input type="text" id="setup-shop" class="setup-input"> 
            <label style="font-size: 0.7rem; font-weight: 800; color: #888; display:block; margin-bottom:5px;">HOURLY WAGE (¥)</label>
            <input type="text" id="setup-wage" class="setup-input" inputmode="numeric">
            <label style="font-size: 0.7rem; font-weight: 800; color: #888; display:block; margin-bottom:5px;">NIGHT RATE (%)</label>
            <input type="text" id="setup-night-rate" class="setup-input" inputmode="numeric">
            <button class="add-btn" onclick="saveSetup()" style="margin-top:20px;">Save & Start</button>
            <button id="setup-cancel-btn" class="add-btn" style="background:none; color:#888; margin-top:10px; display:none;" onclick="hideSetup()">Cancel</button>
        </div>
    </div>

    <script>
        let config = JSON.parse(localStorage.getItem('workConfigV34')) || null;
        let logs = JSON.parse(localStorage.getItem('workLogsV34')) || [];
        let salaryData = JSON.parse(localStorage.getItem('myTenYearSalaryData')) || {};
        let viewDate = new Date(); let selectedDateStr = "";

        const slider = document.getElementById('mainSlider');
        slider.addEventListener('scroll', () => {
            const pageIndex = Math.round(slider.scrollLeft / slider.offsetWidth);
            document.getElementById('dot1').classList.toggle('active', pageIndex === 0);
            document.getElementById('dot2').classList.toggle('active', pageIndex === 1);
            document.getElementById('footer-secret').style.transform = (pageIndex === 1) ? 'translateY(0)' : 'translateY(100%)';
        });
        function goToPage(idx) { slider.scrollTo({ left: slider.offsetWidth * idx, behavior: 'smooth' }); }

        function showSetup(edit) { 
            const overlay = document.getElementById('setup-overlay'); overlay.style.display = 'flex';
            requestAnimationFrame(() => { requestAnimationFrame(() => { overlay.classList.add('active'); }); });
            if(edit && config) { document.getElementById('setup-shop').value = config.name; document.getElementById('setup-wage').value = config.wage; document.getElementById('setup-night-rate').value = config.nightRate; document.getElementById('setup-cancel-btn').style.display = 'block'; }
        }
        function hideSetup() { const o = document.getElementById('setup-overlay'); o.classList.remove('active'); setTimeout(() => { o.style.display = 'none'; }, 450); }
        function saveSetup() {
            const n = document.getElementById('setup-shop').value.trim(), wVal = document.getElementById('setup-wage').value.trim(), rVal = document.getElementById('setup-night-rate').value.trim();
            if(!n || wVal === "" || rVal === "") { showAlert("Error: All fields required"); return; }
            if(!(/^\d+$/.test(wVal)) || !(/^\d+$/.test(rVal))) { showAlert("Error: Numbers Only"); return; }
            config = { name:n, wage:parseInt(wVal), nightRate:parseInt(rVal) };
            localStorage.setItem('workConfigV34', JSON.stringify(config)); hideSetup(); updateDash();
        }

        function changeMonth(dir) { viewDate.setMonth(viewDate.getMonth() + dir); updateDash(); }
        function renderCalendar() {
            const body = document.getElementById('cal-body'); body.innerHTML = '';
            body.className = "cal-grid";
            const days = ["S","M","T","W","T","F","S"];
            for(let i=0; i<7; i++) { const l = document.createElement('div'); l.className="cal-day-label"; l.innerText=days[i]; body.appendChild(l); }
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            const first = new Date(y, m, 1).getDay(), last = new Date(y, m + 1, 0).getDate();
            const now = new Date(); const todayStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}`;
            for(let i=0; i<first; i++) body.appendChild(document.createElement('div'));
            for(let d=1; d<=last; d++) {
                const f = `${y}-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const log = logs.find(l => l.fullDate === f); const cell = document.createElement('div');
                cell.className = `cal-cell ${log ? 'has-data' : ''} ${selectedDateStr === f ? 'selected' : ''}`;
                if(f === todayStr) cell.classList.add('today');
                cell.innerHTML = `<div class="cal-date-num">${d}</div>${log ? `<div class="cal-amt-hint">¥${(log.amt/1000).toFixed(1)}k</div>` : ''}`;
                cell.onclick = (e) => { e.stopPropagation(); selectDate(f); };
                body.appendChild(cell);
            }
        }
        function selectDate(dateStr) {
            if(!dateStr) return; selectedDateStr = dateStr;
            const log = logs.find(l => l.fullDate === dateStr); const d = new Date(dateStr.replace(/-/g, '/'));
            document.getElementById('selected-date-text').innerText = `${d.toLocaleString('en', {month:'long'})} ${d.getDate()}`;
            if(log) { document.getElementById('work-start').value = log.start; document.getElementById('work-end').value = log.end; document.getElementById('save-btn').innerText = "Update Shift"; }
            else { document.getElementById('work-start').value = "09:00"; document.getElementById('work-end').value = "18:00"; document.getElementById('save-btn').innerText = "Record Shift"; }
            renderCalendar();
        }
        function handleLogShift() { if(!selectedDateStr) return; if(logs.find(l => l.fullDate === selectedDateStr)) showModal("Update Record?", "Overwrite existing shift?", () => executeSave()); else executeSave(); }
        function executeSave() {
            const s = document.getElementById('work-start').value, e = document.getElementById('work-end').value; const res = calculatePay(s, e);
            const d = new Date(selectedDateStr.replace(/-/g,'/'));
            logs = logs.filter(l => l.fullDate !== selectedDateStr);
            logs.unshift({ id: Date.now(), fullDate: selectedDateStr, date: `${d.getMonth()+1}/${d.getDate()}`, start: s, end: e, amt: res.total, dur: res.duration, surcharge: res.surcharge, wage: config.wage, rate: config.nightRate, monthKey: `${d.getFullYear()%100}/${d.getMonth()+1}` });
            localStorage.setItem('workLogsV34', JSON.stringify(logs)); updateDash(); selectDate(selectedDateStr);
        }
        
        function updateDash() {
            if(!config) { showSetup(false); return; }
            const monthKey = `${viewDate.getFullYear()%100}/${viewDate.getMonth()+1}`;
            document.getElementById('display-month').innerText = viewDate.toLocaleString('en', {month:'long'}).toUpperCase() + ` (${viewDate.getMonth()+1})`;
            document.getElementById('display-shop').innerText = config.name.toUpperCase();
            const monthLogs = logs.filter(l => l.monthKey === monthKey).sort((a,b) => a.fullDate.localeCompare(b.fullDate));
            document.getElementById('display-total').innerText = `¥${monthLogs.reduce((sum,l)=>sum+l.amt, 0).toLocaleString()}`;
            renderCalendar();
            document.getElementById('log-container').innerHTML = monthLogs.map(l => `<div class="history-item ${l.surcharge > 0 ? 'has-night' : ''}"><div style="flex:1;"><div style="font-weight:700;">${l.date} <span style="font-size:10px; color:#888;">(${l.start}-${l.end})</span></div><div style="font-size:10px; color:#888;">${l.dur}h / ¥${(l.wage||0).toLocaleString()} / N.R-${l.rate||0}%</div></div><div style="text-align:right;"><div style="font-weight:900; color:#4f46e5;">+¥${l.amt.toLocaleString()}</div>${l.surcharge > 0 ? `<div style="font-size:9px; color:var(--color-1); font-weight:700;">Night: +¥${l.surcharge.toLocaleString()}</div>` : ''}</div><div onclick="confirmDelete(${l.id})" style="color:var(--color-2); font-size:22px; font-weight:900; padding: 0 10px 0 20px; cursor:pointer;">✕</div></div>`).join('');
        }

        function calculatePay(s, e) {
            let sM = timeToMin(s), eM = timeToMin(e); if (eM <= sM) eM += 1440;
            let late = 0; for (let m = sM; m < eM; m++) { let c = m % 1440; if (c >= 1320 || c < 300) late++; }
            const totalH = (eM - sM) / 60, surOnly = (late / 60) * (config.wage * (config.nightRate / 100));
            return { total: Math.floor(totalH * config.wage + surOnly), duration: totalH.toFixed(1), surcharge: Math.floor(surOnly) };
        }
        function timeToMin(t) { const [h, m] = t.split(':').map(Number); return h * 60 + m; }

        function initSalaryCalendar(openYear = null) {
            const container = document.getElementById('salary-calendar-container'); container.innerHTML = '';
            for (let y = 25; y <= 34; y++) {
                let yearlyTotal = 0; for (let m = 1; m <= 12; m++) yearlyTotal += (salaryData[`${y}/${m}`]?.amount || 0);
                const section = document.createElement('div'); section.className = 'year-section' + (y === openYear ? ' active' : '');
                section.innerHTML = `<div class="year-header" onclick="this.parentElement.classList.toggle('active')"><div>20${y}</div><div>¥${yearlyTotal.toLocaleString()}</div></div><div class="month-content"></div>`;
                const grid = section.querySelector('.month-content');
                for (let m = 1; m <= 12; m++) {
                    const d = salaryData[`${y}/${m}`] || { amount: 0, memo: '' };
                    const card = document.createElement('div'); card.className = `month-card ${d.amount > 0 ? 'has-data' : ''}`;
                    let lastTap = 0; card.addEventListener('touchend', (e) => { let now = Date.now(); if (now - lastTap < 300 && now - lastTap > 0) { if (d.amount > 0) openSecretEdit(y, m, d); e.preventDefault(); } lastTap = now; });
                    card.innerHTML = `<div>${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1]}</div><b>¥${d.amount.toLocaleString()}</b>${d.memo ? `<div style="font-size:0.5rem; color:var(--color-3);">📄 ${d.memo}</div>` : ''}`;
                    grid.appendChild(card);
                }
                container.appendChild(section);
            }
        }
        function handleSecretInput() {
            const el = document.getElementById('salaryInput'); const val = el.value.trim().toLowerCase();
            if (!val) return;
            if (val === 'a') { let total = 0; Object.values(salaryData).forEach(d => total += d.amount); showAlert(`GRAND TOTAL: ¥${total.toLocaleString()}`); }
            else { const m = val.match(/^(\d+)\/(\d+)\/(\d+)(?:\/(.*))?$/); if (m) { const y = parseInt(m[1]), mo = parseInt(m[2]), amt = parseInt(m[3]), memo = m[4] || ''; salaryData[`${y}/${mo}`] = { amount: amt, memo: memo }; localStorage.setItem('myTenYearSalaryData', JSON.stringify(salaryData)); initSalaryCalendar(y); } }
            el.value = ''; el.blur();
        }
        function openSecretEdit(y, m, d) {
            document.getElementById('secretModalDate').innerText = `20${y}/${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1]}`; document.getElementById('secretEditModal').style.display = 'flex';
            document.getElementById('secretConfirmEdit').onclick = () => { document.getElementById('salaryInput').value = `${y}/${m}/${d.amount}${d.memo ? '/' + d.memo : ''}`; document.getElementById('secretEditModal').style.display = 'none'; document.getElementById('salaryInput').focus(); };
            document.getElementById('secretConfirmReset').onclick = () => { delete salaryData[`${y}/${m}`]; localStorage.setItem('myTenYearSalaryData', JSON.stringify(salaryData)); initSalaryCalendar(y); document.getElementById('secretEditModal').style.display = 'none'; };
        }

        function showAlert(msg) { document.getElementById('alertMsg').innerText = msg; document.getElementById('alertModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('customModal').style.display = 'none'; }
        function showModal(title, msg, onConfirm) { document.getElementById('modalTitle').innerText = title; document.getElementById('modalMsg').innerText = msg; document.getElementById('modalConfirmBtn').onclick = () => { onConfirm(); closeModal(); }; document.getElementById('customModal').style.display = 'flex'; }
        function confirmDelete(id) { 
            showModal("Delete Record?", "Are you sure you want to remove this shift record?", () => { 
                logs = logs.filter(l => l.id !== id); 
                localStorage.setItem('workLogsV34', JSON.stringify(logs)); 
                updateDash(); 
                selectDate(selectedDateStr); 
            }); 
        }

        const initD = new Date();
        selectedDateStr = `${initD.getFullYear()}-${(initD.getMonth()+1).toString().padStart(2,'0')}-${initD.getDate().toString().padStart(2,'0')}`;
        updateDash(); selectDate(selectedDateStr); initSalaryCalendar(initD.getFullYear() % 100);
    </script>
</body>
</html>
