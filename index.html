<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secret Salary Center</title>
    <style>
        :root {
            --bg-color: #f2f2f7; --card-bg: #ffffff;
            --text-main: #1c1c1e; --text-sub: #8e8e93;
            --color-1: #007AFF; --color-2: #FF3B30; --color-3: #34C759; --color-4: #FF9500;
        }
        body {
            font-family: -apple-system, sans-serif; background-color: var(--bg-color);
            margin: 0; padding: 15px 10px 100px; user-select: none; -webkit-tap-highlight-color: transparent;
        }

        .hint-btn {
            position: fixed; top: 15px; left: 15px; width: 35px; height: 35px;
            background: rgba(0,0,0,0.03); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: var(--text-sub); font-size: 14px; z-index: 1000;
        }

        #allTotalOverlay {
            display: none; position: fixed; top: 15px; right: 15px; 
            background: rgba(0,0,0,0.85); color: #fff; padding: 12px 22px; 
            border-radius: 40px; z-index: 3000; font-weight: 700;
        }
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .pop-out { animation: popOut 0.25s forwards; }

        .year-section { background: var(--card-bg); border-radius: 14px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
        .year-header { padding: 18px 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .month-content { 
            max-height: 0; opacity: 0; display: grid; padding: 0 10px;
            grid-template-columns: repeat(2, 1fr); gap: 10px; background: var(--card-bg);
            transition: max-height 0.4s ease, opacity 0.3s ease;
        }
        .year-section.active .month-content { max-height: 1000px; opacity: 1; padding: 0 10px 15px; }

        .month-card { background: var(--bg-color); padding: 12px; border-radius: 12px; min-height: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; }
        .has-data { border-left: 4px solid var(--color-1); background-color: #f0f7ff; }

        #graphOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 2500; flex-direction: column; padding: 50px 5px; box-sizing: border-box;
        }
        .slide-up { animation: slideUp 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .slide-down { animation: slideDown 0.3s ease-in forwards; }
        #graphSvgContainer { width: 100%; height: 400px; overflow: visible; }
        .axis-label { font-size: 10px; fill: var(--text-sub); }
        .data-label { font-size: 9px; font-weight: 900; }

        .footer-fixed { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); padding: 15px 20px 35px; z-index: 900; border-top: 1px solid #d1d1d6; }
        .input-container { display: flex; gap: 10px; max-width: 600px; margin: 0 auto; }
        input[type="text"] { flex: 1; padding: 14px; font-size: 18px; border: 1px solid #d1d1d6; border-radius: 12px; outline: none; background: #fff; }
        
        /* プレースホルダーの文字を更新 */
        input::placeholder { color: #ccc; font-size: 14px; letter-spacing: 0.5px; }

        button.save-btn { padding: 0 25px; background-color: var(--color-1); color: white; border: none; border-radius: 12px; font-weight: 700; }

        #hintModal, #customModal, #alertModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; width: 85%; max-width: 320px; padding: 30px 20px; border-radius: 20px; text-align: center; }
        .modal-pop-in { animation: modalIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .modal-pop-out { animation: modalOut 0.2s ease-in forwards; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes modalOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(0.85); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes popOut { from { opacity: 1; transform: scale(1) translateY(0); } to { opacity: 0; transform: scale(0.8) translateY(-10px); } }
    </style>
</head>
<body>

    <div class="hint-btn" onclick="openHint()">?</div>
    <div id="allTotalOverlay" onclick="closeAllTotal()"></div>
    
    <div id="graphOverlay">
        <h2 id="graphTitle" style="text-align:center; font-weight: 800; font-size:0.9rem; margin-bottom:10px;"></h2>
        <svg id="graphSvgContainer" viewBox="0 0 380 400"></svg>
        <p style="text-align:center; color:#ddd; font-size:0.7rem; margin-top:20px;">Double-tap to close</p>
    </div>

    <div id="calendar-container"></div>

    <div class="footer-fixed">
        <div class="input-container">
            <input type="text" id="salaryInput" placeholder="Year/Month/Amount..." inputmode="text" autocomplete="off">
            <button class="save-btn" onclick="handleInput()">Save</button>
        </div>
    </div>

    <div id="hintModal" onclick="closeHint()">
        <div class="modal-content" style="width: fit-content; min-width: 160px; font-family: monospace;">
            <p>a</p><p>gyy/yy/yy/yy</p><p>y/m/a/c</p>
        </div>
    </div>

    <div id="alertModal" onclick="closeAlert()"><div class="modal-content"><span id="alertMsg" style="font-weight:800; color:var(--color-2)"></span></div></div>

    <div id="customModal">
        <div class="modal-content">
            <span id="modalDate" style="font-weight: 800; font-size: 1.2rem; display:block;"></span>
            <div style="margin-top:15px; color:var(--text-sub); font-size: 0.95rem;">What would you like to do?</div>
            <div style="display:flex; flex-direction:column; gap:10px; margin-top:25px;">
                <button class="save-btn" style="padding:15px;" id="confirmYes">Edit</button>
                <button style="padding:15px; border:1px solid var(--color-2); color:var(--color-2); background:none; border-radius:12px; font-weight:700;" id="confirmReset">Reset</button>
                <button style="padding:10px; background:none; border:none; color:var(--text-sub);" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const colors = ["var(--color-1)", "var(--color-2)", "var(--color-3)", "var(--color-4)"];
        const startYear = 25; const endYear = 34;
        let salaryData = JSON.parse(localStorage.getItem('myTenYearSalaryData')) || {};
        let isEditMode = false;

        function initCalendar(openYear = null) {
            const container = document.getElementById('calendar-container');
            container.innerHTML = '';
            for (let y = startYear; y <= endYear; y++) {
                let yearlyTotal = 0;
                for (let m = 1; m <= 12; m++) yearlyTotal += (salaryData[`${y}/${m}`]?.amount || 0);
                const section = document.createElement('div');
                section.className = 'year-section' + (y === openYear ? ' active' : '');
                section.id = `year-${y}`;
                section.innerHTML = `<div class="year-header" onclick="toggleYear(${y})"><div class="year-title">20${y}</div><div class="year-total">¥${yearlyTotal.toLocaleString()}</div></div><div class="month-content"></div>`;
                const grid = section.querySelector('.month-content');
                for (let m = 1; m <= 12; m++) {
                    const d = salaryData[`${y}/${m}`] || { amount: 0, memo: '' };
                    const card = document.createElement('div');
                    card.className = `month-card ${d.amount > 0 ? 'has-data' : ''}`;
                    let lastTap = 0;
                    card.addEventListener('touchend', (e) => {
                        let now = Date.now();
                        if (now - lastTap < 300 && now - lastTap > 0) { if (d.amount > 0) openEditModal(y, m, d); e.preventDefault(); }
                        lastTap = now;
                    });
                    card.innerHTML = `<div class="month-name">${monthNames[m-1]}</div><div class="salary-display">¥${d.amount.toLocaleString()}</div>${d.memo ? `<div style="font-size:0.6rem; color:var(--color-3); margin-top:3px;">📄 ${d.memo}</div>` : ''}`;
                    grid.appendChild(card);
                }
                container.appendChild(section);
            }
        }

        function toggleYear(y) { document.getElementById(`year-${y}`).classList.toggle('active'); }

        function handleInput() {
            const el = document.getElementById('salaryInput');
            const val = el.value.trim().toLowerCase();
            if (!val) return;
            if (val === 'a') showAllTotal();
            else if (val.startsWith('g')) { if(!showGraph(val)) showAlert("Not Supported"); }
            else { if(!saveSalary(el.value.trim())) showAlert("Not Supported"); }
            el.value = ''; el.blur();
        }

        function showAlert(msg) {
            document.getElementById('alertMsg').innerText = msg;
            const m = document.getElementById('alertModal');
            m.style.display = 'flex'; m.querySelector('.modal-content').className = 'modal-content modal-pop-in';
        }
        function closeAlert() {
            const m = document.getElementById('alertModal');
            m.querySelector('.modal-content').className = 'modal-content modal-pop-out';
            setTimeout(() => { m.style.display = 'none'; }, 200);
        }

        function showAllTotal() {
            let total = 0; Object.values(salaryData).forEach(d => total += d.amount);
            const overlay = document.getElementById('allTotalOverlay');
            overlay.innerText = `GRAND TOTAL: ¥${total.toLocaleString()}`;
            overlay.style.display = 'block'; overlay.className = 'pop-in';
            setTimeout(closeAllTotal, 5000);
        }
        function closeAllTotal() {
            const o = document.getElementById('allTotalOverlay');
            if (o.style.display === 'block') { o.className = 'pop-out'; setTimeout(() => { o.style.display = 'none'; }, 250); }
        }

        function showGraph(cmd) {
            const parts = cmd.replace('g', '').split('/');
            const years = parts.map(p => parseInt(p)).filter(y => !isNaN(y) && y >= startYear && y <= endYear).slice(0, 4);
            if (years.length === 0) return false;

            const overlay = document.getElementById('graphOverlay');
            const svg = document.getElementById('graphSvgContainer');
            svg.innerHTML = ''; overlay.style.display = 'flex';
            overlay.className = 'slide-up';
            
            let gTap = 0;
            overlay.ontouchend = (e) => {
                let now = Date.now();
                if (now - gTap < 300 && now - gTap > 0) { closeGraph(); e.preventDefault(); }
                gTap = now;
            };

            document.getElementById('graphTitle').innerHTML = years.map((y, i) => `<span style="color:${colors[i]}">20${y}</span>`).join(' vs ');

            let maxV = 1;
            years.forEach(y => { for(let m=1; m<=12; m++) maxV = Math.max(maxV, salaryData[`${y}/${m}`]?.amount || 0); });

            const padX = 50, padY = 50, w = 380, h = 400;
            const getX = (m) => padX + (m - 1) * ((w - padX * 2) / 11);
            const getY = (v) => h - padY - (v / maxV) * (h - padY * 2);

            [0, 0.5, 1].forEach(r => {
                const yPos = getY(maxV * r);
                svg.innerHTML += `<line x1="${padX}" y1="${yPos}" x2="${w-10}" y2="${yPos}" stroke="#eee" />`;
                svg.innerHTML += `<text x="5" y="${yPos+3}" class="axis-label">¥${Math.floor(maxV*r/1000)}k</text>`;
            });

            years.forEach((y, idx) => {
                let pts = "";
                for(let m=1; m<=12; m++) {
                    const val = salaryData[`${y}/${m}`]?.amount || 0;
                    const px = getX(m), py = getY(val);
                    pts += `${px},${py} `;
                    if(val > 0) {
                        const offY = (idx * 10) - 15;
                        svg.innerHTML += `<text x="${px}" y="${py + offY}" class="data-label" text-anchor="middle" fill="${colors[idx]}">${(val/1000).toFixed(0)}k</text>`;
                    }
                    svg.innerHTML += `<circle cx="${px}" cy="${py}" r="4" fill="${colors[idx]}" stroke="#fff" stroke-width="1"/>`;
                }
                svg.innerHTML += `<polyline points="${pts}" fill="none" stroke="${colors[idx]}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />`;
            });
            return true;
        }

        function closeGraph() {
            const o = document.getElementById('graphOverlay');
            o.className = 'slide-down'; setTimeout(() => { o.style.display = 'none'; }, 300);
        }

        function saveSalary(input) {
            const m = input.match(/^(\d+)\/(\d+)\/(\d+)(?:\/(.*))?$/);
            if (!m) return false;
            const y = parseInt(m[1]), mo = parseInt(m[2]), amt = parseInt(m[3]), memo = m[4] || '';
            if (mo < 1 || mo > 12 || y < startYear || y > endYear) return false;
            if (salaryData[`${y}/${mo}`] && !isEditMode) { showAlert("Already recorded."); return true; }
            salaryData[`${y}/${mo}`] = { amount: amt, memo: memo };
            localStorage.setItem('myTenYearSalaryData', JSON.stringify(salaryData));
            initCalendar(y); isEditMode = false;
            return true;
        }

        function openEditModal(y, m, d) {
            document.getElementById('modalDate').innerText = `${monthNames[m-1]} 20${y}`;
            const mo = document.getElementById('customModal');
            mo.style.display = 'flex'; mo.querySelector('.modal-content').className = 'modal-content modal-pop-in';
            document.getElementById('confirmYes').onclick = () => {
                const i = document.getElementById('salaryInput');
                i.value = `${y}/${m}/${d.amount}${d.memo ? '/' + d.memo : ''}`;
                isEditMode = true; closeModal();
                setTimeout(() => { i.focus(); i.setSelectionRange(i.value.length, i.value.length); }, 150);
            };
            document.getElementById('confirmReset').onclick = () => {
                delete salaryData[`${y}/${m}`];
                localStorage.setItem('myTenYearSalaryData', JSON.stringify(salaryData));
                initCalendar(y); closeModal();
            };
        }

        function openHint() { const m = document.getElementById('hintModal'); m.style.display = 'flex'; m.querySelector('.modal-content').className = 'modal-content modal-pop-in'; }
        function closeHint() { closeModalById('hintModal'); }
        function closeModal() { closeModalById('customModal'); }
        function closeModalById(id) {
            const m = document.getElementById(id); const c = m.querySelector('.modal-content');
            c.className = 'modal-content modal-pop-out'; setTimeout(() => { m.style.display = 'none'; }, 200);
        }

        initCalendar(new Date().getFullYear() % 100);
    </script>
</body>
</html>
